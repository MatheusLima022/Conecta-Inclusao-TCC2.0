<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Área do Profissional</title>
    <link rel="stylesheet" href="../assets/css/login-medico.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="back-button">
                <a href="lndex.html"><i class="ph ph-arrow-left"></i> Voltar</a>
            </div>
            <div class="doctor-icon">
                <i class="ph ph-stethoscope"></i>
            </div>
            <h1>Área do Profissional</h1>
            <p>Acesse sistemas de diagnóstico, histórico de prontuários e gerencie sua agenda.</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="crm">Registro</label>
                <input type="text" id="crm" placeholder="CRM, COREN, CREFITO" required>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button id="buttonEnter" type="submit" class="btn-login">Entrar como Médico</button>
            <br><br>
            <a href="#" class="forgot-password" onclick="openForgotPasswordModal(event)">Esqueceu sua senha?</a>
            
            <div class="login-footer">
            
                <a href="#">Suporte técnico</a>
            </div>
         
        </form>
    </div>

    <!-- Modal Esqueceu a Senha -->
    <div id="forgotPasswordModal" class="forgot-modal-overlay" style="display: none;">
        <div class="forgot-modal-content">
            <div class="forgot-modal-header">
                <h2>Recuperar Senha</h2>
                <button type="button" class="forgot-modal-close" onclick="closeForgotPasswordModal()">&times;</button>
            </div>
            <div class="forgot-modal-body">
                <p class="forgot-modal-description">Digite seu CRM/Registro para receber um link de recuperação de senha no seu e-mail cadastrado.</p>
                <input type="text" id="forgotEmail" placeholder="000000-UF" class="forgot-input">
                <button type="button" class="forgot-btn" onclick="sendResetEmail('crm')">Enviar Link de Recuperação</button>
            </div>
            <div class="forgot-modal-footer">
                <button type="button" class="forgot-cancel-btn" onclick="closeForgotPasswordModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/login-medico.js"></script>
</body>
</html>
