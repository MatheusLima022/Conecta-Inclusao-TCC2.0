<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticação de Prontuários - Conecta Inclusão</title>
    <link rel="stylesheet" href="../assets/css/auth-records-access.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="ph ph-lock"></i>
                <h1>Acesso aos Prontuários</h1>
                <p>Autenticação Segura Requerida</p>
            </div>

            <form id="authForm" class="auth-form">
                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <div class="form-group">
                    <label for="cnpj">
                        <i class="ph ph-building"></i>
                        CNPJ da Empresa
                    </label>
                    <input 
                        type="text" 
                        id="cnpj" 
                        name="cnpj" 
                        placeholder="00.000.000/0000-00" 
                        maxlength="18"
                        required
                    >
                    <small class="help-text">Digite o CNPJ da sua clínica ou empresa</small>
                </div>

                <div class="form-group">
                    <label for="crm">
                        <i class="ph ph-identification-card"></i>
                        CRM
                    </label>
                    <input 
                        type="text" 
                        id="crm" 
                        name="crm" 
                        placeholder="ABC12345" 
                        maxlength="10"
                        required
                    >
                    <small class="help-text">Seu número de registro profissional</small>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="ph ph-password"></i>
                        Senha
                    </label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Digite sua senha" 
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    <small class="help-text">Sua senha de acesso ao sistema</small>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="ph ph-sign-in"></i>
                    Acessar Prontuários
                </button>
            </form>

            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Autenticando...</p>
            </div>

            <div class="auth-footer">
                <p>Voltando ao dashboard em <span id="countdown">0</span> segundos</p>
                <button type="button" id="backButton" class="btn-back">
                    <i class="ph ph-arrow-left"></i>
                    Voltar ao Dashboard
                </button>
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth-records-access.js"></script>
</body>
</html>
