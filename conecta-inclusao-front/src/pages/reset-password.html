<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Conecta Inclusão</title>
    <link rel="stylesheet" href="../assets/css/login-paciente.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <main class="login-container">
        <section class="login-card">
            <div class="login-header">
                <i class="ph ph-lock-key"></i>
                <h1>Redefinir senha</h1>
                <p>Informe o token recebido por e-mail e crie uma nova senha.</p>
            </div>

            <form id="resetPasswordForm">
                <div class="input-group">
                    <label for="resetToken">Token de recuperação</label>
                    <input type="text" id="resetToken" placeholder="Cole o token recebido" required>
                </div>
                <div class="input-group">
                    <label for="newPassword">Nova senha</label>
                    <input type="password" id="newPassword" data-password-guidance="true" placeholder="Nova senha segura" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirmar senha</label>
                    <input type="password" id="confirmPassword" placeholder="Repita a nova senha" required>
                </div>
                <button type="submit" class="btn-login">Salvar nova senha</button>
            </form>
        </section>
    </main>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/reset-password.js"></script>
</body>
</html>
