<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Médico - Conecta Inclusão</title>
    <link rel="stylesheet" href="../assets/css/login-medico.css">
    <style>
        .login-container {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 768px) {
            .form-section {
                grid-template-columns: 1fr;
            }
        }
        .form-note {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }
        .form-note a {
            color: #f5576c;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-content">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo">
                        <i class="ph ph-stethoscope"></i>
                    </div>
                    <h1>Cadastre-se como Médico</h1>
                    <p>Crie sua conta para gerenciar consultas</p>
                </div>

                <form id="registerDoctorForm">
                    <div class="form-section">
                        <div class="input-group">
                            <label for="name">Nome Completo *</label>
                            <input type="text" id="name" placeholder="Dr. João Silva" required>
                        </div>
                        <div class="input-group">
                            <label for="crm">CRM *</label>
                            <input type="text" id="crm" placeholder="ABC1234" maxlength="7" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="especialidade">Especialidade</label>
                        <input type="text" id="especialidade" placeholder="Ex: Cardiologia, Pediatria">
                    </div>

                    <div class="input-group">
                        <label for="bio">Biografia/Sobre</label>
                        <textarea id="bio" placeholder="Conte sobre sua experiência e especialidades" rows="3"></textarea>
                    </div>

                    <div class="form-section">
                        <div class="input-group">
                            <label for="password">Senha *</label>
                            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <div class="input-group">
                            <label for="confirmPassword">Confirmar Senha *</label>
                            <input type="password" id="confirmPassword" placeholder="Confirme sua senha" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">Criar Conta</button>
                </form>

                <div class="form-note">
                    Já tem uma conta? <a href="login-medico.html">Faça login aqui</a>
                </div>
            </div>

            <div class="login-footer">
                <a href="lndex.html"><i class="ph ph-arrow-left"></i> Voltar ao início</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/cadastro-medico.js"></script>
</body>
</html>
