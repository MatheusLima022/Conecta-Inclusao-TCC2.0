<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Paciente - Portal Saúde</title>
    <link rel="stylesheet" href="../assets/css/login-paciente.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="back-button">
                <a href="lndex.html"><i class="ph ph-arrow-left"></i> Voltar</a>
            </div>
            <div class="patient-icon">
                <i class="ph ph-user-circle"></i>
            </div>
            <h1>Área do Paciente</h1>
            <p>Acesse seus exames e histórico médico com segurança.</p>
        </div>

        <form id="loginFormPaciente">
            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>

            <div class="input-group">
                <div class="label-row">
                    <label for="password">Senha</label>
                    
                </div>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn-login">Acessar meus dados</button>
            <br><br>
            <a href="#" class="forgot-password" onclick="openForgotPasswordModal(event)">Esqueceu a senha?</a>
            
            <div class="login-footer">
                <p style="text-align: center; margin-top: 1.5rem; color: #666;">
                    Não tem uma conta? <a href="cadastro-paciente.html" style="color: #3498db; font-weight: 600;">Cadastre-se aqui</a>
                </p>
            </div>
        </form>
    </div>

    <!-- Modal Esqueceu a Senha -->
    <div id="forgotPasswordModal" class="forgot-modal-overlay" style="display: none;">
        <div class="forgot-modal-content">
            <div class="forgot-modal-header">
                <h2>Recuperar Senha</h2>
                <button type="button" class="forgot-modal-close" onclick="closeForgotPasswordModal()">&times;</button>
            </div>
            <div class="forgot-modal-body">
                <p class="forgot-modal-description">Digite seu CPF para receber um link de recuperação de senha no seu e-mail cadastrado.</p>
                <input type="text" id="forgotEmail" placeholder="000.000.000-00" class="forgot-input" maxlength="14">
                <button type="button" class="forgot-btn" onclick="sendResetEmail('cpf')">Enviar Link de Recuperação</button>
            </div>
            <div class="forgot-modal-footer">
                <button type="button" class="forgot-cancel-btn" onclick="closeForgotPasswordModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/script-paciente.js"></script>
</body>
</html>
