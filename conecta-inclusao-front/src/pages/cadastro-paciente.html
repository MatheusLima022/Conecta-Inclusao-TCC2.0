<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Paciente - Conecta Inclusão</title>
    <link rel="stylesheet" href="../assets/css/login-paciente.css">
    <style>
        .login-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 768px) {
            .form-section {
                grid-template-columns: 1fr;
            }
        }
        .form-note {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }
        .form-note a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-content">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo">
                        <i class="ph ph-patient"></i>
                    </div>
                    <h1>Cadastre-se como Paciente</h1>
                    <p>Crie sua conta para agendar consultas</p>
                </div>

                <form id="registerPatientForm">
                    <div class="form-section">
                        <div class="input-group">
                            <label for="name">Nome Completo *</label>
                            <input type="text" id="name" placeholder="João Silva" required>
                        </div>
                        <div class="input-group">
                            <label for="cpf">CPF *</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="input-group">
                            <label for="dataNascimento">Data de Nascimento</label>
                            <input type="date" id="dataNascimento">
                        </div>
                        <div class="input-group">
                            <label for="tipoDeficiencia">Tipo de Deficiência</label>
                            <input type="text" id="tipoDeficiencia" placeholder="Ex: Mobilidade, Auditiva">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="nomeResponsavel">Nome do Responsável (se menor de idade)</label>
                        <input type="text" id="nomeResponsavel" placeholder="Nome do responsável">
                    </div>

                    <div class="form-section">
                        <div class="input-group">
                            <label for="password">Senha *</label>
                            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <div class="input-group">
                            <label for="confirmPassword">Confirmar Senha *</label>
                            <input type="password" id="confirmPassword" placeholder="Confirme sua senha" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">Criar Conta</button>
                </form>

                <div class="form-note">
                    Já tem uma conta? <a href="login-paciente.html">Faça login aqui</a>
                </div>
            </div>

            <div class="login-footer">
                <a href="lndex.html"><i class="ph ph-arrow-left"></i> Voltar ao início</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/cadastro-paciente.js"></script>
</body>
</html>
