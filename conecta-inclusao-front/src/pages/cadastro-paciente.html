<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Paciente - Conecta Inclusão</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/phosphor-icons/web@master/src/index.css">
    <link rel="stylesheet" href="../assets/css/cadastro-paciente.css">
</head>
<body>
    <main class="page-shell">
        <div class="container-form">
            <div class="form-title">
                <div class="form-icon">
                    <i class="ph ph-user-plus"></i>
                </div>
                <h1>Cadastro de Paciente</h1>
                <p>Preencha seus dados para criar sua conta</p>
            </div>

            <div class="info-box">
                <i class="ph ph-info"></i>
                <span>Campos marcados com <span class="required">*</span> são obrigatórios</span>
            </div>

            <form id="registerPatientForm">
                <h3 class="section-title" style="margin-top: 0;">Informações Pessoais</h3>

                <div class="form-group">
                    <label for="cpf">CPF <span class="required">*</span></label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="form-group">
                    <label for="name">Nome Completo <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="João Silva" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dataNascimento">Data de Nascimento <span class="required">*</span></label>
                        <input type="date" id="dataNascimento" name="dataNascimento" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="seu.email@example.com">
                    </div>
                </div>

                <h3 class="section-title">Informações de Saúde</h3>

                <div class="form-group">
                    <label for="tipoDeficiencia">Tipo de Deficiência <span class="required">*</span></label>
                    <select id="tipoDeficiencia" name="tipoDeficiencia" required>
                        <option value="">Selecione um tipo...</option>
                        <option value="Deficiência Auditiva">Deficiência Auditiva</option>
                        <option value="Deficiência Visual">Deficiência Visual</option>
                        <option value="Deficiência Intelectual">Deficiência Intelectual</option>
                        <option value="Deficiência Motora">Deficiência Motora</option>
                        <option value="Deficiência Múltipla">Deficiência Múltipla</option>
                        <option value="Transtorno do Espectro Autista">Transtorno do Espectro Autista</option>
                        <option value="Outra">Outra</option>
                    </select>
                </div>

                <h3 class="section-title">Informações do Responsável</h3>

                <div class="form-group">
                    <label for="nomeResponsavel">Nome do Responsável <span class="required">*</span></label>
                    <input type="text" id="nomeResponsavel" name="nomeResponsavel" placeholder="Nome do responsável" required>
                </div>

                <h3 class="section-title">Acesso</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Senha <span class="required">*</span></label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Senha <span class="required">*</span></label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repita a senha" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">Criar Conta</button>
                    <button type="button" class="btn btn-cancel" onclick="window.history.back()">Cancelar</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/cadastro-paciente.js"></script>
</body>
</html>
